[config]
pre-release-hook = ["node", "scripts/sync-version.js"]
post-release-hook = ["make", "publish-npm"]

[[pre-release-replacements]]
file = "README.md"
search = "genome-rs = \"[^\"]+\""
replace = "genome-rs = \"{{version}}\""

[[pre-release-replacements]]
file = "README.md"
search = "genome = \"[^\"]+\""
replace = "genome = \"{{version}}\""